<!DOCTYPE html>
<html class="light" lang="id">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EcoPolicy - Header dengan User Menu</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
tailwind.config={darkMode:"class",theme:{extend:{colors:{
"surface-dim":"#d4dcd5","on-background":"#161d19","surface-variant":"#dde4dd",
"surface-container":"#e8f0e9","tertiary":"#a43a3a","on-surface-variant":"#3c4a42",
"primary-fixed":"#6ffbbe","inverse-surface":"#2b322d","error":"#ba1a1a",
"primary-container":"#10b981","on-tertiary":"#ffffff","background":"#f4fbf4",
"tertiary-container":"#fc7c78","on-surface":"#161d19","surface-tint":"#006c49",
"secondary":"#5d5f5f","on-primary-container":"#00422b","surface-container-low":"#eef6ee",
"surface-container-lowest":"#ffffff","on-primary":"#ffffff","primary":"#006c49",
"on-secondary-container":"#616363","surface-container-highest":"#dde4dd",
"outline-variant":"#bbcabf","surface-container-high":"#e3eae3","outline":"#6c7a71",
"secondary-container":"#dfe0e0","surface":"#f4fbf4","on-error":"#ffffff"
},borderRadius:{DEFAULT:"0.25rem",lg:"0.5rem",xl:"0.75rem",full:"9999px"},
spacing:{sm:"0.5rem",md:"1rem",lg:"1.5rem",gutter:"1.5rem",base:"4px",margin:"2rem","2xl":"3rem",xl:"2rem",xs:"0.25rem"},
fontFamily:{"body-sm":["Poppins"],"headline-xl":["Poppins"],"label-caps":["Poppins"],"headline-lg":["Poppins"],"title-md":["Poppins"],"display-lg":["Poppins"],"body-base":["Poppins"]},
fontSize:{"body-sm":["14px",{lineHeight:"1.5",fontWeight:"400"}],"headline-xl":["36px",{lineHeight:"1.2",letterSpacing:"-0.02em",fontWeight:"600"}],
"label-caps":["12px",{lineHeight:"1",letterSpacing:"0.05em",fontWeight:"600"}],"headline-lg":["30px",{lineHeight:"1.3",letterSpacing:"-0.01em",fontWeight:"600"}],
"title-md":["20px",{lineHeight:"1.5",fontWeight:"500"}],"display-lg":["48px",{lineHeight:"1.1",letterSpacing:"-0.02em",fontWeight:"700"}],
"body-base":["16px",{lineHeight:"1.6",fontWeight:"400"}]}}}}</script>
<style>
body{font-family:'Poppins',sans-serif;}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}
/* User menu dropdown */
.user-menu-wrapper{position:relative;}
.user-avatar{cursor:pointer;transition:all .3s ease;}
.user-avatar:hover{box-shadow:0 0 0 3px rgba(16,185,129,0.2);}
.user-avatar.active{box-shadow:0 0 0 3px rgba(16,185,129,0.3);}
.dropdown-menu{position:absolute;top:calc(100% + 8px);right:0;min-width:200px;background:white;border-radius:12px;box-shadow:0 10px 40px rgba(0,0,0,0.12);border:1px solid #e5e7eb;opacity:0;visibility:hidden;transform:translateY(-8px) scale(0.95);transition:all .25s cubic-bezier(0.175,0.885,0.32,1.275);z-index:300;}
.dropdown-menu.show{opacity:1;visibility:visible;transform:translateY(0) scale(1);}
.dropdown-item{display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:14px;color:#3c4a42;cursor:pointer;transition:all .15s ease;border-radius:0;}
.dropdown-item:first-child{border-radius:12px 12px 0 0;}
.dropdown-item:last-child{border-radius:0 0 12px 12px;}
.dropdown-item:hover{background:#f0fdf4;color:#006c49;}
.dropdown-item.danger{color:#ba1a1a;}
.dropdown-item.danger:hover{background:#fef2f2;}
.dropdown-divider{height:1px;background:#e5e7eb;margin:4px 0;}
/* Overlay to close dropdown */
.dropdown-overlay{position:fixed;inset:0;z-index:250;}
</style>
</head>
<body class="bg-background text-on-surface min-h-screen">

<!-- ===== STEP HEADER WITH USER MENU ===== -->
<div class="fixed top-0 left-0 right-0 z-[200] bg-surface/80 backdrop-blur-md border-b border-outline-variant">
  <div class="max-w-12xl mx-auto px-6 py-2.5 flex items-center justify-between">
    <!-- Logo -->
    <div class="flex items-center gap-2">
      <span class="material-symbols-outlined text-primary text-2xl">eco</span>
      <span class="font-title-md text-title-md font-bold text-primary hidden sm:inline">EcoPolicy</span>
    </div>

    <!-- Step Indicators -->
    <div class="flex items-center gap-0">
      <span class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-semibold text-on-surface-variant">
        <span class="w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-bold border border-current">1</span>
        <span class="hidden md:inline">Penjelasan</span>
      </span>
      <div class="w-6 h-px mx-1 bg-outline-variant"></div>
      <span class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-semibold bg-primary text-white">
        <span class="w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-bold bg-white text-primary border-white">2</span>
        <span class="hidden md:inline">Input Angket</span>
      </span>
      <div class="w-6 h-px mx-1 bg-outline-variant"></div>
      <span class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-semibold text-on-surface-variant">
        <span class="w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-bold border border-current">3</span>
        <span class="hidden md:inline">Hasil</span>
      </span>
    </div>

    <!-- Right: Timer + User Menu -->
    <div class="flex items-center gap-4">
      <!-- Timer -->
      <div class="flex items-center gap-1.5 text-tertiary">
        <span class="material-symbols-outlined text-base">timer</span>
        <span class="font-title-md text-title-md font-bold tabular-nums">18:42</span>
      </div>
      <!-- User Menu -->
      <div class="user-menu-wrapper" id="userMenuWrapper">
        <button onclick="toggleDropdown()" id="userAvatarBtn"
          class="user-avatar w-9 h-9 rounded-full bg-primary-container/20 border-2 border-outline-variant/50 flex items-center justify-center overflow-hidden">
          <span class="material-symbols-outlined text-primary text-[20px]">person</span>
        </button>
        <!-- Dropdown -->
        <div class="dropdown-menu" id="dropdownMenu">
          <!-- User Info -->
          <div class="px-4 py-3 border-b border-outline-variant/30">
            <p class="font-body-base font-semibold text-on-surface text-sm">Budi Santoso</p>
            <p class="text-body-sm text-on-surface-variant text-xs">budi@sekolah.id</p>
          </div>
          <!-- Menu Items -->
          <div class="py-1">
            <div class="dropdown-item" onclick="closeDropdown()">
              <span class="material-symbols-outlined text-[18px]">person</span>
              <span>Profil Saya</span>
            </div>
            <div class="dropdown-item" onclick="closeDropdown()">
              <span class="material-symbols-outlined text-[18px]">help</span>
              <span>Bantuan</span>
            </div>
            <div class="dropdown-divider"></div>
            <div class="dropdown-item danger" onclick="closeDropdown()">
              <span class="material-symbols-outlined text-[18px]">logout</span>
              <span class="font-medium">Keluar</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Overlay to close dropdown on outside click -->
<div class="dropdown-overlay" id="overlay" style="display:none;" onclick="closeDropdown()"></div>

<!-- Page content placeholder -->
<main class="pt-20 pb-32 max-w-5xl mx-auto px-6">
  <div class="bg-surface-container-lowest rounded-xl p-8 border border-outline-variant/20 text-center">
    <p class="text-on-surface-variant">Header dengan user menu — klik icon user di pojok kanan atas</p>
  </div>
</main>

<script>
function toggleDropdown() {
  const menu = document.getElementById('dropdownMenu');
  const overlay = document.getElementById('overlay');
  const btn = document.getElementById('userAvatarBtn');
  const isOpen = menu.classList.contains('show');
  if (isOpen) {
    closeDropdown();
  } else {
    menu.classList.add('show');
    overlay.style.display = 'block';
    btn.classList.add('active');
  }
}
function closeDropdown() {
  document.getElementById('dropdownMenu').classList.remove('show');
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('userAvatarBtn').classList.remove('active');
}
</script>

</body>
</html>
