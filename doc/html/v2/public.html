<!DOCTYPE html>
<html class="light" lang="id">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Platform Evaluasi Kebijakan Lingkungan Sekolah</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#059669",
            "primary-light": "#34d399",
            "primary-dark": "#047857",
            "accent": "#8b5cf6",
            "background": "#f0fdf4",
            "surface": "#ffffff",
            "on-surface": "#1e293b",
            "on-surface-variant": "#64748b",
            "on-primary": "#ffffff",
            "outline": "#e2e8f0",
          },
          fontFamily: {
            "inter": ["Inter", "sans-serif"],
          },
        },
      },
    }
  </script>
  <style>
    * { font-family: 'Inter', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    /* ===== GRADIENT TEXT SHIMMER ===== */
    .shimmer-text {
      background: linear-gradient(90deg, #ffffff 0%, #a7f3d0 25%, #ffffff 50%, #a7f3d0 75%, #ffffff 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s linear infinite;
    }
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    /* ===== BUTTON GLOW ===== */
    .btn-glow {
      position: relative;
      overflow: hidden;
    }
    .btn-glow::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .btn-glow:hover::before {
      opacity: 1;
    }

    /* ===== NAV LINK UNDERLINE ===== */
    .nav-link {
      position: relative;
    }
    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 50%;
      width: 0;
      height: 2px;
      background: #059669;
      transition: all 0.3s ease;
      transform: translateX(-50%);
    }
    .nav-link:hover::after {
      width: 100%;
    }

    /* ===== ICON SPIN ON HOVER ===== */
    .icon-hover-spin:hover .material-symbols-outlined {
      animation: spinOnce 0.5s ease;
    }
    @keyframes spinOnce {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* ===== PULSE DOT ===== */
    .pulse-dot {
      animation: pulseDot 2s ease-in-out infinite;
    }
    @keyframes pulseDot {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.6); }
      50% { box-shadow: 0 0 0 8px rgba(255,255,255,0); }
    }

    /* ===== FLOATING ANIMATION ===== */
    .float-hover {
      transition: transform 0.3s ease;
    }
    .float-hover:hover {
      transform: translateY(-4px);
    }

    /* ===== GRADIENT BORDER ===== */
    .gradient-border {
      position: relative;
      background: transparent;
      border: none;
    }
    .gradient-border::before {
      content: '';
      position: absolute;
      inset: 0;
      padding: 2px;
      border-radius: 1rem;
      background: linear-gradient(135deg, #34d399, #ffffff, #34d399);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      transition: background 0.3s ease;
    }
    .gradient-border:hover::before {
      background: linear-gradient(135deg, #ffffff, #34d399, #ffffff);
    }

    /* ===== SCALE PRESS ===== */
    .press-scale:active {
      transform: scale(0.96);
    }

    /* ===== BACKGROUND ORB ===== */
    .hero-bg {
      position: relative;
      overflow: hidden;
    }
    .hero-bg::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(52,211,153,0.3) 0%, transparent 70%);
      top: -200px;
      right: -200px;
      border-radius: 50%;
      animation: orbFloat 8s ease-in-out infinite;
    }
    .hero-bg::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(167,243,208,0.2) 0%, transparent 70%);
      bottom: -100px;
      left: -100px;
      border-radius: 50%;
      animation: orbFloat 10s ease-in-out infinite reverse;
    }
    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(30px, -30px) scale(1.1); }
    }

    /* ===== TEXT FADE IN ===== */
    .fade-in {
      animation: fadeIn 0.8s ease-out forwards;
    }
    .fade-in-delay {
      animation: fadeIn 0.8s ease-out 0.2s forwards;
      opacity: 0;
    }
    .fade-in-delay-2 {
      animation: fadeIn 0.8s ease-out 0.4s forwards;
      opacity: 0;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== NAVBAR SCROLL ===== */
    .nav-scrolled {
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
    }
  </style>
</head>
<body class="bg-background text-on-surface min-h-screen">

  <!-- ===== STICKY NAV ===== -->
  <header class="fixed top-0 left-0 right-0 z-50 bg-white border-b border-outline">
    <nav class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3 icon-hover-spin cursor-pointer">
        <div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center float-hover">
          <span class="material-symbols-outlined text-white" style="font-size: 22px;">eco</span>
        </div>
        <span class="font-bold text-lg text-on-surface-variant hidden md:block leading-tight max-w-[300px]">
          Platform Evaluasi Lingkungan
        </span>
      </div>

      <div class="hidden lg:flex items-center gap-8">
        <a href="#home" class="nav-link text-primary font-semibold border-b-2 border-primary pb-1 hover:-translate-y-0.5 transition-all duration-300">Home</a>
        <a href="#features" class="nav-link text-on-surface-variant hover:text-primary hover:-translate-y-0.5 transition-all duration-300 font-medium">Features</a>
        <a href="#about" class="nav-link text-on-surface-variant hover:text-primary hover:-translate-y-0.5 transition-all duration-300 font-medium">About Us</a>
        <div class="h-6 w-px bg-outline"></div>
        <div class="flex gap-3">
          <button class="press-scale px-5 py-2.5 text-primary font-semibold border-2 border-primary rounded-xl hover:bg-primary hover:text-white transition-all duration-500">
            Login
          </button>
          <button class="press-scale px-5 py-2.5 bg-primary text-white rounded-xl font-semibold hover:bg-emerald-700 transition-all duration-500">
            Register
          </button>
        </div>
      </div>

      <button class="lg:hidden p-2 text-on-surface rounded-xl hover:bg-outline/50 transition-colors">
        <span class="material-symbols-outlined">menu</span>
      </button>
    </nav>
  </header>

  <main class="flex-1 flex flex-col">

    <!-- ===== HERO SECTION ===== -->
    <section id="home" class="relative min-h-screen flex items-center justify-center overflow-hidden hero-bg" style="background: linear-gradient(135deg, #054b35 0%, #059669 50%, #34d399 100%);">
      <div class="relative z-10 max-w-12xl mx-auto px-6 text-center">

          <!-- Title -->
          <h1 class="text-12xl md:text-5xl lg:text-6xl font-extrabold leading-tight text-white mb-6 fade-in">
            Evaluasi Kebijakan Lingkungan Sekolah
          </h1>

          <!-- Description -->
          <p class="text-lg text-emerald-100 mx-auto mb-8 leading-relaxed fade-in-delay">
            Platform digital untuk mengevaluasi implementasi kebijakan lingkungan di sekolah melalui assessmen berbasis kuesioner terstruktur.
            <br/>
            Pertumbuhan keberlanjutan institusi Anda dengan mudah.
          </p>

          <!-- Buttons -->
          <div class="flex flex-col sm:flex-row gap-4 justify-center mb-10 fade-in-delay-2">
            <button class="press-scale px-8 py-4 bg-white text-emerald-700 rounded-2xl font-bold text-lg shadow-lg hover:bg-emerald-700 hover:text-white transition-all duration-500 flex items-center justify-center gap-3">
              Mulai Evaluasi
              <span class="material-symbols-outlined">arrow_forward</span>
            </button>
            <button class="press-scale px-8 py-4 border-2 border-white text-white rounded-2xl font-bold text-lg hover:bg-white hover:text-emerald-700 transition-all duration-500">
              Daftar Sekolah
            </button>
          </div>

        </div>
    </section>

  </main>

  <script>
    // Navbar scroll effect
    const navbar = document.querySelector('header');
    window.addEventListener('scroll', () => {
      if (window.scrollY > 50) {
        navbar.classList.add('nav-scrolled');
      } else {
        navbar.classList.remove('nav-scrolled');
      }
    });
  </script>

</body>
</html>
