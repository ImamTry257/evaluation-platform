<!DOCTYPE html>
<html class="h-full" lang="id">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Login Admin - PolicyEval</title>
    <!-- Font & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#10b981",
                        "on-primary": "#ffffff",
                        "surface-tint": "#006c49",
                        "primary-fixed": "#6ffbbe",
                        "secondary": "#5d5f5f",
                        "inverse-primary": "#4edea3",
                        "surface-container": "#e8f0e9",
                        "tertiary-container": "#fc7c78",
                        "on-primary-container": "#00422b",
                        "surface-container-high": "#e3eae3",
                        "surface-variant": "#dde4dd",
                        "surface-container-low": "#eef6ee",
                        "secondary-container": "#dfe0e0",
                        "background": "#f4fbf4",
                        "outline": "#6c7a71",
                        "on-tertiary-container": "#711419",
                        "inverse-surface": "#2b322d",
                        "on-background": "#161d19",
                        "surface": "#f4fbf4",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed-variant": "#842225",
                        "on-primary-fixed": "#002113",
                        "on-secondary-fixed": "#1a1c1c",
                        "inverse-on-surface": "#ebf3eb",
                        "on-tertiary": "#ffffff",
                        "surface-container-highest": "#dde4dd",
                        "on-surface": "#161d19",
                        "surface-dim": "#d4dcd5",
                        "error-container": "#ffdad6",
                        "tertiary-fixed": "#ffdad7",
                        "on-primary-fixed-variant": "#005236",
                        "secondary-fixed": "#e2e2e2",
                        "on-secondary-fixed-variant": "#454747",
                        "on-secondary-container": "#616363",
                        "on-error-container": "#93000a",
                        "primary-fixed-dim": "#4edea3",
                        "surface-bright": "#f4fbf4",
                        "tertiary": "#a43a3a",
                        "primary-container": "#10b981",
                        "on-secondary": "#ffffff",
                        "on-error": "#ffffff",
                        "secondary-fixed-dim": "#c6c6c7",
                        "tertiary-fixed-dim": "#ffb3af",
                        "on-tertiary-fixed": "#410005",
                        "on-surface-variant": "#3c4a42",
                        "outline-variant": "#bbcabf",
                        "error": "#ba1a1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.75rem",
                        "lg": "0.75rem",
                        "xl": "1rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline-xl": ["Inter"],
                        "body-sm": ["Inter"],
                        "label-caps": ["Inter"],
                        "display-lg": ["Inter"],
                        "title-md": ["Inter"],
                        "body-base": ["Inter"],
                        "headline-lg": ["Inter"]
                    },
                    "fontSize": {
                        "headline-xl": ["36px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                        "body-sm": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}],
                        "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "title-md": ["20px", {"lineHeight": "1.5", "fontWeight": "500"}],
                        "body-base": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "headline-lg": ["30px", {"lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600"}]
                    },
                    "spacing": {
                        "xs": "0.25rem",
                        "md": "1rem",
                        "margin": "2rem",
                        "base": "4px",
                        "sm": "0.5rem",
                        "xl": "2rem",
                        "lg": "1.5rem",
                        "gutter": "1.5rem",
                        "2xl": "3rem"
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        [v-cloak] { display: none; }

        /* ===== FORM INPUTS ===== */
        .form-input {
            transition: all 0.3s ease;
        }
        .form-input:hover {
            border-color: #10b981;
            box-shadow: 0 2px 10px rgba(16, 185, 129, 0.1);
        }
        .form-input:focus {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(16, 185, 129, 0.12);
        }

        /* ===== INPUT ICON ===== */
        .input-icon {
            transition: all 0.3s ease;
        }
        .form-group:focus-within .input-icon {
            color: #10b981;
        }

        /* ===== PASSWORD TOGGLE ===== */
        .password-toggle {
            transition: all 0.3s ease;
        }
        .password-toggle:hover {
            color: #006c49;
        }

        /* ===== LABEL ===== */
        .form-label {
            transition: all 0.3s ease;
        }
        .form-group:focus-within .form-label {
            color: #10b981;
        }

        /* ===== SUBMIT BUTTON ===== */
        .btn-submit {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-submit:not(:disabled):hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.35);
            background-color: #006c49;
        }
        .btn-submit:active:not(:disabled) {
            transform: scale(0.98);
        }

        /* ===== LINK ===== */
        .link-hover {
            transition: all 0.3s ease;
        }
        .link-hover:hover {
            color: #006c49;
        }

        /* ===== BRAND ===== */
        .brand-logo {
            transition: all 0.3s ease;
        }
        .brand-logo:hover {
            transform: scale(1.05);
        }

        /* ===== ANIMATIONS ===== */
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        .fade-in-delay { animation: fadeIn 0.5s ease-out 0.1s forwards; opacity: 0; }
        .fade-in-delay-2 { animation: fadeIn 0.5s ease-out 0.2s forwards; opacity: 0; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== GRADIENT ACCENT LINE ===== */
        .accent-line {
            background: linear-gradient(90deg, #10b981, #006c49);
        }
    </style>
</head>
<body class="bg-surface h-full selection:bg-primary-fixed selection:text-on-primary-container">

<div class="h-full flex items-center justify-center px-md" id="app" v-cloak>
    <div class="w-full max-w-[400px]">

        <!-- Brand Header -->
        <header class="mb-xl text-center fade-in">
            <div class="flex items-center justify-center gap-2.5 mb-4">
                <div class="brand-logo w-10 h-10 bg-primary rounded-xl flex items-center justify-center shadow-sm">
                    <span class="material-symbols-outlined text-white text-[24px]" style="font-variation-settings: 'FILL' 1;">eco</span>
                </div>
                <span class="font-headline-lg text-[22px] tracking-tight text-primary font-bold">PolicyEval</span>
            </div>
            <!-- Accent line -->
            <div class="accent-line h-[3px] w-12 mx-auto rounded-full mb-6"></div>
        </header>

        <!-- Login Card -->
        <div class="bg-surface-container-lowest rounded-2xl shadow-sm border border-outline-variant/30 p-xl fade-in-delay">
            <!-- Title -->
            <div class="mb-lg">
                <h1 class="font-headline-lg text-headline-lg text-on-surface leading-tight mb-1">
                    Masuk
                </h1>
                <p class="font-body-sm text-body-sm text-on-surface-variant">
                    Akses panel administrasi evaluasi kebijakan.
                </p>
            </div>

            <!-- Form -->
            <form @submit.prevent="handleLogin" class="space-y-5">
                <!-- Email Field -->
                <div class="space-y-1.5 form-group">
                    <label class="form-label font-label-caps text-[11px] text-on-surface-variant uppercase tracking-[0.08em] font-bold ml-1" for="email">
                        Email
                    </label>
                    <div class="relative">
                        <div class="input-icon absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-outline transition-colors">
                            <span class="material-symbols-outlined text-[18px]">mail</span>
                        </div>
                        <input
                            class="form-input w-full h-11 pl-11 pr-4 bg-surface border border-outline-variant rounded-xl font-body-base text-body-sm focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none placeholder:text-outline-variant/60"
                            id="email"
                            type="email"
                            placeholder="admin@gmail.com"
                            v-model="form.email"
                            required
                        />
                    </div>
                </div>

                <!-- Password Field -->
                <div class="space-y-1.5 form-group">
                    <label class="form-label font-label-caps text-[11px] text-on-surface-variant uppercase tracking-[0.08em] font-bold ml-1" for="password">
                        Kata Sandi
                    </label>
                    <div class="relative">
                        <div class="input-icon absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-outline transition-colors">
                            <span class="material-symbols-outlined text-[18px]">lock</span>
                        </div>
                        <input
                            :type="showPassword ? 'text' : 'password'"
                            class="form-input w-full h-11 pl-11 pr-11 bg-surface border border-outline-variant rounded-xl font-body-base text-body-sm focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none placeholder:text-outline-variant/60"
                            id="password"
                            placeholder="••••••••"
                            v-model="form.password"
                            required
                        />
                        <button
                            @click="showPassword = !showPassword"
                            class="password-toggle absolute inset-y-0 right-0 pr-3.5 flex items-center text-outline"
                            type="button"
                        >
                            <span class="material-symbols-outlined text-[18px]">{{ showPassword ? 'visibility' : 'visibility_off' }}</span>
                        </button>
                    </div>
                </div>

                <!-- Error Message -->
                <div v-if="error" class="flex items-center gap-2 p-3 bg-red-50 border border-red-200 rounded-xl text-red-700 text-sm">
                    <span class="material-symbols-outlined text-[18px]">error</span>
                    <span>{{ error }}</span>
                </div>

                <!-- Submit Button -->
                <button
                    class="btn-submit w-full h-12 bg-primary-container text-on-primary rounded-xl font-title-md flex items-center justify-center gap-2"
                    type="submit"
                    :disabled="isLoading"
                >
                    <span v-if="isLoading" class="animate-spin material-symbols-outlined text-[18px]">progress_activity</span>
                    <span v-else>Masuk</span>
                    <span v-if="!isLoading" class="material-symbols-outlined text-[18px]">arrow_forward</span>
                </button>
            </form>
        </div>

        <!-- Footer -->
        <footer class="mt-lg text-center fade-in-delay-2">
            <p class="font-body-sm text-body-sm text-on-surface-variant">
                Kembali ke <a href="login.html" class="link-hover text-primary font-semibold">halaman responden</a>
            </p>
        </footer>

    </div>
</div>

<!-- Vue 3 -->
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script>
    const { createApp, ref, reactive } = Vue;

    createApp({
        setup() {
            const showPassword = ref(false);
            const isLoading = ref(false);
            const error = ref('');
            const form = reactive({
                email: '',
                password: ''
            });

            const handleLogin = async (e) => {
                error.value = '';
                isLoading.value = true;

                // Simulasi loading
                setTimeout(() => {
                    console.log('Admin login attempt:', form.email);
                    isLoading.value = false;

                    // Simulasi redirect berdasarkan role
                    // Dalam implementasi nyata, role dari API response
                    // const role = response.data.user.role;
                    // if (role === 'SUPERADMIN') → redirect ke /admin (dengan module master admin)
                    // if (role === 'ADMIN') → redirect ke /admin
                }, 1500);
            };

            return {
                form,
                showPassword,
                isLoading,
                error,
                handleLogin
            };
        }
    }).mount('#app');
</script>

</body>
</html>
